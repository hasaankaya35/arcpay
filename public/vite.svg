<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="secondary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06d6a0" />
      <stop offset="100%" stop-color="#118ab2" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" rx="100" fill="#0f172a" />
  
  <!-- Network Arc lines -->
  <path d="M 120 280 Q 200 120 280 280" fill="none" stroke="url(#primary)" stroke-width="24" stroke-linecap="round" />
  <path d="M 140 280 Q 200 160 260 280" fill="none" stroke="url(#secondary)" stroke-width="16" stroke-linecap="round" />
  
  <!-- Nodes -->
  <circle cx="120" cy="280" r="24" fill="#818cf8" />
  <circle cx="280" cy="280" r="24" fill="#818cf8" />
  <circle cx="200" cy="120" r="32" fill="#06d6a0" />
  
  <!-- Nanopayment Inner Dot -->
  <circle cx="200" cy="120" r="12" fill="#0f172a" />
</svg>
